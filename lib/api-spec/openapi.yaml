openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PathFinder 10k API - AI-powered career guidance for Nigerian students
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: students
    description: Student profile operations
  - name: assessments
    description: Career assessment operations
  - name: recommendations
    description: Career recommendation operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /students/profile:
    get:
      operationId: getStudentProfile
      tags: [students]
      summary: Get current student profile
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Profile not found
    post:
      operationId: createStudentProfile
      tags: [students]
      summary: Create or update student profile
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/dashboard:
    get:
      operationId: getStudentDashboard
      tags: [dashboard]
      summary: Get student dashboard summary
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Dashboard summary with stats and recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /assessments:
    get:
      operationId: listAssessments
      tags: [assessments]
      summary: List all assessments for current student
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of assessments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assessment"
    post:
      operationId: submitAssessment
      tags: [assessments]
      summary: Submit a career assessment
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentInput"
      responses:
        "201":
          description: Assessment submitted and recommendation generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResult"

  /assessments/{id}:
    get:
      operationId: getAssessment
      tags: [assessments]
      summary: Get a specific assessment
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assessment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "404":
          description: Assessment not found

  /recommendations:
    get:
      operationId: listRecommendations
      tags: [recommendations]
      summary: List saved career recommendations for current student
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of saved recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"

  /recommendations/{id}:
    get:
      operationId: getRecommendation
      tags: [recommendations]
      summary: Get a specific recommendation with full AI explanation
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full recommendation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "404":
          description: Recommendation not found

  /recommendations/{id}/save:
    post:
      operationId: saveRecommendation
      tags: [recommendations]
      summary: Save a recommendation to student's profile
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recommendation saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"

  /careers:
    get:
      operationId: listCareers
      tags: [recommendations]
      summary: List all available career paths
      responses:
        "200":
          description: List of career paths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CareerPath"

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Student:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        fullName:
          type: string
        schoolName:
          type: string
        phoneNumber:
          type: ["string", "null"]
        classLevel:
          type: string
          enum: [SSS1, SSS2, SSS3, JAMBite]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkId
        - fullName
        - schoolName
        - classLevel
        - createdAt

    StudentInput:
      type: object
      properties:
        fullName:
          type: string
        schoolName:
          type: string
        phoneNumber:
          type: string
        classLevel:
          type: string
          enum: [SSS1, SSS2, SSS3, JAMBite]
      required:
        - fullName
        - schoolName
        - classLevel

    Assessment:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        answers:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - studentId
        - answers
        - createdAt

    AssessmentInput:
      type: object
      properties:
        answers:
          type: object
          additionalProperties: true
      required:
        - answers

    AssessmentResult:
      type: object
      properties:
        assessment:
          $ref: "#/components/schemas/Assessment"
        recommendation:
          $ref: "#/components/schemas/Recommendation"
      required:
        - assessment
        - recommendation

    Recommendation:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        assessmentId:
          type: integer
        topCareer:
          type: string
        alternativeCareers:
          type: array
          items:
            type: string
        jambSubjects:
          type: array
          items:
            type: string
        aiExplanation:
          type: ["string", "null"]
        aiRoadmap:
          type: ["string", "null"]
        aiSkills:
          type: ["string", "null"]
        aiEncouragement:
          type: ["string", "null"]
        isSaved:
          type: boolean
        reasonForRecommendation:
          type: ["string", "null"]
        suitableCourses:
          type: array
          items:
            type: string
        jobRoles:
          type: array
          items:
            type: string
        requiredSkills:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - studentId
        - assessmentId
        - topCareer
        - alternativeCareers
        - jambSubjects
        - isSaved
        - suitableCourses
        - jobRoles
        - requiredSkills
        - createdAt

    CareerPath:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        courses:
          type: array
          items:
            type: string
        jambSubjects:
          type: array
          items:
            type: string
        jobRoles:
          type: array
          items:
            type: string
      required:
        - name
        - description
        - courses
        - jambSubjects
        - jobRoles

    DashboardSummary:
      type: object
      properties:
        student:
          $ref: "#/components/schemas/Student"
        assessmentCount:
          type: integer
        savedRecommendationsCount:
          type: integer
        latestRecommendation:
          $ref: "#/components/schemas/Recommendation"
        hasCompletedAssessment:
          type: boolean
      required:
        - assessmentCount
        - savedRecommendationsCount
        - hasCompletedAssessment
